    task_dir: nav2_asset_switchback_narrow
    language_instruction: Navigate the mobile base through the narrow switchback corridor and stop at the goal pose.
    detailed_language_instruction: Drive the SplitAloha base through a narrow static switchback corridor built from repository USD assets and stop at the final pose without any manipulation actions.
